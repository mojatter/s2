version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
  settings:
    gosec:
      excludes:
        # G104 (unhandled errors) overlaps with errcheck and we
        # intentionally ignore some Close errors.
        - G104

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
