name: E2E

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Run E2E tests
        run: make test-e2e
      -
        name: Show s2 logs on failure
        if: failure()
        run: docker compose -f s2test/e2e/docker-compose.yml logs s2 s2-mem
